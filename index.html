<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Великие ученные</title>
  <style>
    :root{
      --bg:#071238;
      --panel:#0d1b4a;
      --line:rgba(255,255,255,.14);
      --text:#ffffff;
      --muted:#9fb0d9;
      --accent:#ffcf48;
      --btn:#2d3f84;
      --btn-hover:#3950a3;
      --ok:#45d483;
      --bad:#ff6b6b;
      --option:#0a1742;
      --option-hover:#13255f;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:linear-gradient(180deg, #08122f 0%, #071238 100%);
      color:var(--text);
      min-height:100vh;
      padding:18px;
    }

    .app{
      max-width:980px;
      margin:0 auto;
    }

    .screen{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:24px;
      padding:22px;
      box-shadow:0 10px 30px rgba(0,0,0,.22);
    }

    .start-screen{
      min-height:420px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      gap:18px;
    }

    .start-title{
      margin:0;
      font-size:42px;
      font-weight:700;
    }

    .start-text{
      margin:0;
      color:var(--muted);
      font-size:18px;
      max-width:520px;
      line-height:1.5;
    }

    .start-btn{
      background:var(--btn);
      color:#fff;
      border:none;
      border-radius:16px;
      padding:16px 28px;
      font-size:20px;
      font-weight:700;
      cursor:pointer;
    }

    .start-btn:hover{
      background:var(--btn-hover);
    }

    .topbar{
      display:grid;
      grid-template-columns: repeat(4, 1fr);
      gap:16px;
      align-items:center;
      margin-bottom:20px;
      font-size:18px;
    }

    .topbar-item{
      color:#fff;
    }

    .topbar-item b{
      font-weight:700;
    }

    .timer{
      text-align:right;
      color:var(--accent);
      font-weight:700;
    }

    .content{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:18px;
      margin-bottom:22px;
    }

    .card{
      background:rgba(255,255,255,.03);
      border:1px solid var(--line);
      border-radius:20px;
      min-height:260px;
      padding:18px;
    }

    .card h2{
      margin:16px 0 18px;
      font-size:26px;
      font-weight:700;
    }

    .description-text{
      margin:0;
      font-size:17px;
      line-height:1.45;
      max-width:92%;
    }

    .image-card{
      padding:0;
      overflow:hidden;
    }

    .image-card img{
      width:100%;
      height:100%;
      min-height:260px;
      object-fit:cover;
      display:block;
      border-radius:20px;
    }

    .options{
      display:grid;
      gap:12px;
      margin-top:8px;
    }

    .option-btn{
      width:100%;
      min-height:52px;
      border-radius:16px;
      border:1px solid var(--line);
      background:var(--option);
      color:#fff;
      font-size:17px;
      text-align:left;
      padding:12px 16px;
      cursor:pointer;
      transition:.15s ease;
    }

    .option-btn:hover{
      background:var(--option-hover);
    }

    .option-btn:disabled{
      cursor:default;
      opacity:1;
    }

    .option-btn.correct{
      background:rgba(69,212,131,.18);
      border-color:rgba(69,212,131,.65);
      color:var(--ok);
    }

    .option-btn.wrong{
      background:rgba(255,107,107,.18);
      border-color:rgba(255,107,107,.65);
      color:var(--bad);
    }

    .actions{
      margin-top:14px;
      display:flex;
      gap:12px;
      align-items:center;
    }

    .next-btn{
      background:var(--btn);
      color:#fff;
      border:none;
      border-radius:16px;
      padding:12px 18px;
      font-size:18px;
      font-weight:700;
      cursor:pointer;
    }

    .next-btn:hover{
      background:var(--btn-hover);
    }

    .status{
      min-height:54px;
      margin-top:16px;
      font-size:18px;
      font-weight:700;
      color:#fff;
    }

    .status.ok{ color:var(--ok); }
    .status.bad{ color:var(--bad); }

    .result-box{
      display:none;
      margin-top:14px;
      background:rgba(255,255,255,.03);
      border:1px solid var(--line);
      border-radius:20px;
      padding:22px;
    }

    .result-box h2{
      margin:0 0 14px;
      font-size:30px;
    }

    .result-box p{
      margin:10px 0;
      font-size:22px;
    }

    .restart-btn{
      margin-top:14px;
      background:var(--btn);
      color:#fff;
      border:none;
      border-radius:16px;
      padding:12px 18px;
      font-size:18px;
      font-weight:700;
      cursor:pointer;
    }

    .restart-btn:hover{
      background:var(--btn-hover);
    }

    @media (max-width: 820px){
      .topbar{
        grid-template-columns: 1fr 1fr;
      }

      .timer{
        text-align:left;
      }

      .content{
        grid-template-columns:1fr;
      }

      .card{
        min-height:auto;
      }

      .image-card img{
        min-height:220px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div id="startScreen" class="screen start-screen">
      <h1 class="start-title">Великие ученные географии</h1>
      <p class="start-text">Проверь свои знания. Прочитай описание, посмотри на фото и выбери правильный ответ.</p>
      <button id="startBtn" class="start-btn">Начать тест</button>
    </div>

    <div id="testScreen" class="screen" style="display:none;">
      <div class="topbar">
        <div class="topbar-item">Вопрос: <b id="questionNumber">1</b></div>
        <div class="topbar-item">Правильно: <b id="correctCount">0</b></div>
        <div class="topbar-item">Ошибки: <b id="wrongCount">0</b></div>
        <div class="timer">⌛ <span id="timerValue">40</span> сек</div>
      </div>

      <div id="questionBlock">
        <div class="content">
          <div class="card">
            <h2>Описание</h2>
            <p id="descriptionText" class="description-text"></p>
          </div>

          <div class="card image-card">
            <img id="objectImage" alt="Фото объекта">
          </div>
        </div>

        <div id="options" class="options"></div>

        <div class="actions">
          <button id="nextBtn" class="next-btn">Следующий</button>
        </div>

        <div id="status" class="status"></div>
      </div>

      <div id="resultBox" class="result-box">
        <h2>Тест завершён</h2>
        <p><b>Итог:</b> <span id="finalScore"></span></p>
        <p><b>Оценка:</b> <span id="finalGrade"></span></p>
        <button id="restartBtn" class="restart-btn">Пройти заново</button>
      </div>
    </div>
  </div>

  <script>
   const questions = [

{
description:"Один из основателей современной географии, изучал связь природы и общества.",
image:"ritter.jpg",
options:[
"Александр фон Гумбольдт",
"Сол Коэн",
"Карл Риттер",
"Николай Баранский"
],
correct:2
},

{
description:"Основатель физической географии, исследовал климат, природные зоны и растительность.",
image:"humboldt.jpg",
options:[
"Карл Риттер",
"Александр фон Гумбольдт",
"Фернан Бродель",
"Карл Тролль"
],
correct:1
},

{
description:"Разработал теорию геостратегических регионов и разделил мир на геополитические зоны.",
image:"cohen.jpg",
options:[
"Фридрих Ратцель",
"Рудольф Челлен",
"Сол Коэн",
"Эдвард Люттвак"
],
correct:2
},

{
description:"Основатель экономической географии СССР, изучал размещение хозяйства и промышленности.",
image:"baranskiy.jpg",
options:[
"Карл Тролль",
"Владимир Вернадский",
"Фернан Бродель",
"Николай Баранский"
],
correct:3
},

{
description:"Исследовал влияние географии и экономики на развитие цивилизаций.",
image:"brodel.jpg",
options:[
"Фернан Бродель",
"Эрнст Геккель",
"Карл Риттер",
"Сол Коэн"
],
correct:0
},

{
description:"Создал учение о биосфере и роли живых организмов на Земле.",
image:"vernadskiy.jpg",
options:[
"Карл Тролль",
"Николай Баранский",
"Владимир Вернадский",
"Фридрих Ратцель"
],
correct:2
},

{
description:"Основатель ландшафтной экологии, изучал природные комплексы.",
image:"troll.jpg",
options:[
"Карл Риттер",
"Карл Тролль",
"Эрнст Геккель",
"Фернан Бродель"
],
correct:1
},

{
description:"Ввёл термин «экология» и изучал связь организмов с окружающей средой.",
image:"haeckel.jpg",
options:[
"Карл Тролль",
"Сол Коэн",
"Николай Баранский",
"Эрнст Геккель"
],
correct:3
},

{
description:"Основатель политической географии, создал теорию «жизненного пространства».",
image:"ratzel.jpg",
options:[
"Фридрих Ратцель",
"Рудольф Челлен",
"Эдвард Люттвак",
"Карл Риттер"
],
correct:0
},

{
description:"Разработал концепцию геоэкономики и роль экономики в мировой политике.",
image:"luttwak.jpg",
options:[
"Сол Коэн",
"Фернан Бродель",
"Рудольф Челлен",
"Эдвард Люттвак"
],
correct:3
},

{
description:"Ввёл термин «геополитика» и развил эту науку.",
image:"kjellen.jpg",
options:[
"Фридрих Ратцель",
"Эдвард Люттвак",
"Карл Тролль",
"Рудольф Челлен"
],
correct:3
}

];
    let currentIndex = 0;
    let correct = 0;
    let wrong = 0;
    let timeLeft = 20;
    let timerId = null;
    let answered = false;

    const startScreen = document.getElementById("startScreen");
    const testScreen = document.getElementById("testScreen");
    const startBtn = document.getElementById("startBtn");
    const restartBtn = document.getElementById("restartBtn");

    const questionNumber = document.getElementById("questionNumber");
    const correctCount = document.getElementById("correctCount");
    const wrongCount = document.getElementById("wrongCount");
    const timerValue = document.getElementById("timerValue");
    const descriptionText = document.getElementById("descriptionText");
    const objectImage = document.getElementById("objectImage");
    const optionsBox = document.getElementById("options");
    const nextBtn = document.getElementById("nextBtn");
    const status = document.getElementById("status");
    const questionBlock = document.getElementById("questionBlock");
    const resultBox = document.getElementById("resultBox");
    const finalScore = document.getElementById("finalScore");
    const finalGrade = document.getElementById("finalGrade");

    function stopTimer() {
      if (timerId) {
        clearInterval(timerId);
        timerId = null;
      }
    }

    function startTimer() {
      stopTimer();
      timeLeft = 40;
      timerValue.textContent = timeLeft;

      timerId = setInterval(() => {
        timeLeft--;
        timerValue.textContent = timeLeft;

        if (timeLeft <= 0) {
          stopTimer();
          autoRevealAnswer();
        }
      }, 1000);
    }

    function loadQuestion() {
      if (currentIndex >= questions.length) {
        showFinalResult();
        return;
      }

      answered = false;
      status.textContent = "";
      status.className = "status";

      const q = questions[currentIndex];
      questionNumber.textContent = currentIndex + 1;
      descriptionText.textContent = q.description;
      objectImage.src = q.image;
      objectImage.alt = q.options[q.correct];

      renderOptions(q);
      startTimer();
    }

    function renderOptions(q) {
      optionsBox.innerHTML = "";

      q.options.forEach((option, index) => {
        const btn = document.createElement("button");
        btn.className = "option-btn";
        btn.textContent = option;
        btn.addEventListener("click", () => chooseAnswer(index));
        optionsBox.appendChild(btn);
      });
    }

    function disableOptions() {
      const buttons = document.querySelectorAll(".option-btn");
      buttons.forEach(btn => btn.disabled = true);
      return buttons;
    }

    function chooseAnswer(index) {
      if (answered) return;

      answered = true;
      stopTimer();

      const q = questions[currentIndex];
      const buttons = disableOptions();

      if (index === q.correct) {
        correct++;
        correctCount.textContent = correct;
        buttons[index].classList.add("correct");
        status.className = "status ok";
        status.textContent = "Правильно!";
      } else {
        wrong++;
        wrongCount.textContent = wrong;
        buttons[index].classList.add("wrong");
        buttons[q.correct].classList.add("correct");
        status.className = "status bad";
        status.textContent = "Неправильно.";
      }
    }

    function autoRevealAnswer() {
      if (answered) return;

      answered = true;
      wrong++;
      wrongCount.textContent = wrong;

      const q = questions[currentIndex];
      const buttons = disableOptions();
      buttons[q.correct].classList.add("correct");

      status.className = "status bad";
      status.textContent = "Время вышло.";
    }

    function nextQuestion() {
      if (!answered) {
        autoRevealAnswer();
      }
      currentIndex++;
      setTimeout(loadQuestion, 250);
    }

    function getGrade(score, total) {
      const percent = (score / total) * 100;
      if (percent >= 90) return "5";
      if (percent >= 75) return "4";
      if (percent >= 50) return "3";
      return "2";
    }

    function showFinalResult() {
      questionBlock.style.display = "none";
      resultBox.style.display = "block";
      finalScore.textContent = `${correct}/${questions.length}`;
      finalGrade.textContent = getGrade(correct, questions.length);
      timerValue.textContent = "0";
    }

    function startTest() {
      currentIndex = 0;
      correct = 0;
      wrong = 0;
      answered = false;

      correctCount.textContent = "0";
      wrongCount.textContent = "0";
      questionBlock.style.display = "block";
      resultBox.style.display = "none";

      startScreen.style.display = "none";
      testScreen.style.display = "block";

      loadQuestion();
    }

    startBtn.addEventListener("click", startTest);
    restartBtn.addEventListener("click", startTest);
    nextBtn.addEventListener("click", nextQuestion);
  </script>
</body>
</html>
